name: Update Library Data

on:
  schedule:
    # Run at 09:00 UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    name: Run scraper and open PR if data changed
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C.UTF-8
      CGO_ENABLED: '0'
      GOFLAGS: -trimpath
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'
          cache: true
          cache-dependency-path: go.sum

      - name: Verify Go version files are aligned
        run: |
          MOD_VERSION="$(awk '/^go /{print $2; exit}' go.mod)"
          FILE_VERSION="$(tr -d '[:space:]' < .go-version)"
          if [ "${MOD_VERSION}" != "${FILE_VERSION}" ]; then
            echo "go.mod version (${MOD_VERSION}) does not match .go-version (${FILE_VERSION})"
            exit 1
          fi

      - name: Verify go modules
        run: go mod verify

      - name: Run scraper
        run: go run ./cmd/scraper

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with updated data
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="scraper/update-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add data/
          git commit -m "data: update library data from CA State Library

          Automated update from the monthly scraper run."
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Update library data ($(date +%Y-%m-%d))" \
            --body "Automated update from the monthly scraper run. Review the diff in \`data/\` before merging." \
            --base main
