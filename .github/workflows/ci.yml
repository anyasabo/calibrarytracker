name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint, Check, Build (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Prettier (formatting)
        run: npx prettier --check .

      - name: ESLint (code quality)
        run: npx eslint .

      - name: svelte-check (TypeScript + Svelte diagnostics)
        run: npm run check

      - name: Build
        run: npm run build

  go:
    name: Lint, Vet, Test (Scraper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v ./...
