name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint, Check, Build (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - run: npm ci --include=dev --no-audit --no-fund

      - name: Prettier (formatting)
        run: npx prettier --check .

      - name: ESLint (code quality)
        run: npx eslint .

      - name: svelte-check (TypeScript + Svelte diagnostics)
        run: npm run check

      - name: Build
        run: npm run build

  go:
    name: Lint, Vet, Test (Scraper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v ./...
